{% extends "base.html" %}

{% block title %}Edit Quiz - Liquid_Triple_R{% endblock %}

{% block content %}
<div class="container admin-container">
    <div class="admin-header">
        <h1>✏️ Edit Quiz</h1>
    </div>

    <div class="form-container">
        <form method="post" class="admin-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="title">Quiz Title *</label>
                <input type="text" id="title" name="title"
                    value="{{ quiz.title }}" placeholder="Enter quiz title"
                    required class="form-input">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description"
                    placeholder="Enter quiz description" rows="4"
                    class="form-input">{{ quiz.description }}</textarea>
            </div>

            <div class="form-group">
                <label for="time_limit">Time Limit (minutes) *</label>
                <input type="number" id="time_limit" name="time_limit"
                    value="{{ quiz.time_limit }}" min="1" max="180"
                    required class="form-input">
            </div>

            <div class="form-group">
                <label for="expires_at">Quiz Expiry Date & Time</label>
                <input type="datetime-local" id="expires_at" name="expires_at"
                    class="form-input"
                    value="{{ quiz.expires_at|date:'Y-m-d' }}T{{ quiz.expires_at|time:'H:i' }}">
                <small style="color:#888;">এই সময়ের পরে quiz submit করা যাবে না। শুধু correct answers দেখা যাবে। (Optional)</small>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{% url 'quiz_detail' quiz.id %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
