{% extends 'base.html' %}

{% block title %}Add Notice | Liquid_Triple_R Admin{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-plus-circle"></i> Post New Notice</h1>
    <p>Announce important updates to all students.</p>
</div>

<div class="form-container">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label for="title">Notice Title</label>
            <input type="text" name="title" id="title" class="form-input" placeholder="e.g., Exam Schedule Update" required>
        </div>
        
        <div class="form-group">
            <label for="content">Notice Content</label>
            <textarea name="content" id="content" rows="6" placeholder="Write your announcement here..." required></textarea>
        </div>
        
        <div class="form-group">
            <label>Attachment (Optional)</label>
            <div class="upload-drop-zone" id="drop-zone">
                <i class="fas fa-cloud-upload-alt upload-icon"></i>
                <span class="upload-title">Click or drag file to this area to upload</span>
                <span class="upload-desc">Support for multiple images or PDFs.</span>
                <input type="file" name="attachments" id="attachments" accept="image/*,.pdf" multiple style="display: none;">
            </div>
            <div id="file-preview-container" style="display: none; margin-top: 1rem;">
            </div>
        </div>
        
        <div class="form-actions" style="margin-top: 2rem;">
            <a href="/notices/" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Publish Notice</button>
        </div>
    </form>
</div>

<style>
    .upload-drop-zone {
        border: 2px dashed #cbd5e1;
        border-radius: 16px;
        padding: 2.5rem 1rem;
        text-align: center;
        background: #f8fafc;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
    }
    .upload-drop-zone:hover, .upload-drop-zone.dragover {
        border-color: #3b82f6;
        background: #eff6ff;
    }
    .upload-icon {
        font-size: 3rem;
        color: #94a3b8;
        margin-bottom: 1rem;
        display: block;
        transition: all 0.3s ease;
    }
    .upload-drop-zone:hover .upload-icon, .upload-drop-zone.dragover .upload-icon {
        color: #3b82f6;
        transform: translateY(-5px);
    }
    .upload-title {
        display: block;
        font-size: 1.1rem;
        font-weight: 700;
        color: #334155;
        margin-bottom: 0.5rem;
    }
    .upload-desc {
        display: block;
        font-size: 0.85rem;
        color: #64748b;
    }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('attachments');
    const previewContainer = document.getElementById('file-preview-container');
    
    let selectedFiles = new DataTransfer();

    // Click to upload
    dropZone.addEventListener('click', () => fileInput.click());

    // Drag events
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
    });

    // Handle dropped files
    dropZone.addEventListener('drop', (e) => {
        handleFiles(e.dataTransfer.files);
    }, false);

    // Handle file selection
    fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
    });

    function handleFiles(files) {
        for (let i = 0; i < files.length; i++) {
            selectedFiles.items.add(files[i]);
        }
        fileInput.files = selectedFiles.files;
        renderPreviews();
    }

    // Format bytes
    function formatBytes(bytes, decimals = 2) {
        if (!+bytes) return '0 Bytes';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
    }

    // Render previews
    function renderPreviews() {
        previewContainer.innerHTML = '';
        if (selectedFiles.files.length > 0) {
            previewContainer.style.display = 'block';
            
            Array.from(selectedFiles.files).forEach((file, index) => {
                let iconClass = 'fas fa-file-alt';
                let iconColor = '#3b82f6';
                if (file.type.includes('image')) {
                    iconClass = 'fas fa-image';
                    iconColor = '#10b981';
                } else if (file.type.includes('pdf')) {
                    iconClass = 'fas fa-file-pdf';
                    iconColor = '#ef4444';
                }

                const itemHtml = `
                    <div style="display: flex; align-items: center; gap: 1rem; background: #f8fafc; padding: 1rem; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 0.75rem;">
                        <i class="${iconClass}" style="font-size: 2rem; color: ${iconColor};"></i>
                        <div style="flex: 1; overflow: hidden;">
                            <div style="font-weight: 700; color: #1e293b; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${file.name}</div>
                            <div style="font-size: 0.8rem; color: #64748b;">${formatBytes(file.size)}</div>
                        </div>
                        <button type="button" onclick="removeFile(${index})" style="background: #fee2e2; color: #ef4444; border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;" title="Remove file" onmouseover="this.style.background='#fecaca'" onmouseout="this.style.background='#fee2e2'">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `;
                previewContainer.insertAdjacentHTML('beforeend', itemHtml);
            });
        } else {
            previewContainer.style.display = 'none';
        }
    }

    window.removeFile = function(index) {
        const newTransfer = new DataTransfer();
        Array.from(selectedFiles.files).forEach((file, i) => {
            if (i !== index) newTransfer.items.add(file);
        });
        selectedFiles = newTransfer;
        fileInput.files = selectedFiles.files;
        renderPreviews();
    }
});
</script>
{% endblock %}
