{% extends 'base.html' %}

{% block title %}Add Notice | Liquid_Triple_R Admin{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-plus-circle"></i> Post New Notice</h1>
    <p>Announce important updates to all students.</p>
</div>

<div class="form-container">
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="title">Notice Title</label>
            <input type="text" name="title" id="title" class="form-input" placeholder="e.g., Exam Schedule Update" required>
        </div>
        
        <div class="form-group">
            <label for="content">Notice Content</label>
            <textarea name="content" id="content" rows="6" placeholder="Write your announcement here..." required></textarea>
        </div>
        
        <div class="form-actions">
            <a href="/notices/" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Publish Notice</button>
        </div>
    </form>
</div>
{% endblock %}
