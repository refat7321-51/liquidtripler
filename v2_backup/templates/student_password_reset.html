{% extends "base.html" %}
{% block title %}Reset Password - Liquid_Triple_R{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="circles">
        <li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li>
    </div>

    <div class="auth-card">
        <div class="auth-header">
            <div class="icon-blob">
                <i class="fas fa-key"></i>
            </div>
            <h2>Reset Password</h2>
            <p>Enter your registered email to receive an OTP</p>
        </div>

        {% if error %}
        <div class="alert-error">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" placeholder="Enter your email" required autofocus>
                </div>
            </div>

            <button type="submit" class="btn-primary-glow">
                <span>Send OTP</span>
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>

        <div class="back-link">
            <a href="{% url 'student_login' %}">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>
</div>

<style>
    :root {
        --primary-glow: #ef4444; /* Use red for reset flow */
        --secondary-glow: #f43f5e;
        --glass-bg: rgba(255, 255, 255, 0.75);
        --glass-border: rgba(255, 255, 255, 0.5);
    }

    .auth-wrapper {
        min-height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(-45deg, #f1f5f9, #e2e8f0, #fef2f2, #f1f5f9);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        padding: 2rem 0;
        overflow-y: auto;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .circles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: -1; }
    .circles li { position: absolute; display: block; list-style: none; width: 20px; height: 20px; background: rgba(239, 68, 68, 0.1); animation: animate 25s linear infinite; bottom: -150px; border-radius: 50%; }
    .circles li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
    .circles li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }

    @keyframes animate {
        0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
        100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
    }

    .auth-card {
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: 2rem;
        padding: 3rem;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        animation: cardEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        margin: auto;
    }

    @keyframes cardEnter {
        from { opacity: 0; transform: scale(0.9) translateY(30px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .auth-header { text-align: center; margin-bottom: 2rem; }
    .icon-blob { width: 64px; height: 64px; background: linear-gradient(135deg, #ef4444, #f43f5e); border-radius: 1.25rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; color: white; font-size: 1.5rem; box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3); }
    
    .auth-header h2 { font-size: 1.75rem; font-weight: 800; color: #1e293b; margin-bottom: 0.5rem; }
    .auth-header p { color: #64748b; font-size: 0.95rem; }

    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-size: 0.875rem; font-weight: 700; color: #475569; margin-bottom: 0.5rem; }

    .input-wrapper { position: relative; }
    .input-wrapper i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #94a3b8; transition: color 0.3s; }
    
    .input-wrapper input {
        width: 100%;
        padding: 0.875rem 1rem 0.875rem 2.75rem;
        background: white;
        border: 2px solid #f1f5f9;
        border-radius: 1rem;
        font-size: 1rem;
        font-family: inherit;
        transition: all 0.3s;
        box-sizing: border-box;
    }

    .input-wrapper input:focus {
        outline: none;
        border-color: #ef4444;
        box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
    }
    .input-wrapper input:focus + i { color: #ef4444; }

    .alert-error {
        background: #fee2e2;
        border-left: 4px solid #ef4444;
        color: #b91c1c;
        padding: 1rem;
        border-radius: 0.75rem;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .btn-primary-glow {
        width: 100%;
        padding: 1.125rem;
        background: linear-gradient(135deg, #1e293b, #334155);
        color: white;
        border: none;
        border-radius: 1rem;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        transition: all 0.3s;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    .btn-primary-glow:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2); }

    .back-link { text-align: center; margin-top: 1.5rem; }
    .back-link a { color: #94a3b8; text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: color 0.2s; }
    .back-link a:hover { color: #64748b; }
</style>
{% endblock %}
